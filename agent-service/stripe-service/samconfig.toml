# SAM CLI Configuration for Stripe Proxy Lambda
# More info: https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html

version = 0.1

[default]
[default.global.parameters]
stack_name = "stripe-proxy"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
# Uncomment and set these for non-interactive deployment:
# parameter_overrides = "StripeSecretKey=sk_test_xxx StripePublishableKey=pk_test_xxx WorkshopSecret=your-secret"

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"

